version: '3.8'

services:
  backend:
    build:
      context: ./innovation-hub/apps/api
      dockerfile: Dockerfile
    image: marketplace-backend
    container_name: marketplace-backend-1
    ports:
      - "8000:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=sqlite:////app/data/hub.db
    volumes:
      - marketplace_data:/app/data
      - marketplace_uploads:/app/uploads

  frontend:
    build:
      context: ./innovation-hub/apps/web
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE=
    image: marketplace-frontend
    container_name: marketplace-frontend-1
    ports:
      - "80:8080"
    depends_on:
      - backend

volumes:
  marketplace_data:
  marketplace_uploads:

